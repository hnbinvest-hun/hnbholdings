<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-Map — Halal & Friendly Seoul</title>
<style>
/* ── Reset & Base ── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Noto Sans KR','Segoe UI',system-ui,sans-serif;font-size:14px;color:#111;background:#fff}
button{cursor:pointer;font-family:inherit}
input{font-family:inherit}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#body{display:flex;flex:1;overflow:hidden;position:relative}

/* ── Top Bar ── */
#topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid #e8e8e8;background:#fff;flex-shrink:0;z-index:100}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer;flex-shrink:0;text-decoration:none}
.logo-mark{width:34px;height:34px;background:#1D9E75;border-radius:9px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.logo-text{font-size:17px;font-weight:700;color:#1D9E75;letter-spacing:-0.3px}
.search-wrap{flex:1;position:relative;max-width:480px}
.search-wrap input{width:100%;padding:9px 14px 9px 38px;border-radius:10px;border:1.5px solid #e0e0e0;font-size:13px;background:#f8f8f8;transition:border-color .15s,background .15s;outline:none}
.search-wrap input:focus{border-color:#1D9E75;background:#fff}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#aaa;width:16px;height:16px}
.topbar-actions{display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0}
.lang-btn{padding:6px 12px;border-radius:8px;background:#E1F5EE;color:#085041;font-size:12px;font-weight:600;border:none}
.user-btn{width:34px;height:34px;border-radius:50%;background:#f0f0f0;border:none;display:flex;align-items:center;justify-content:center}
.user-btn svg{width:16px;height:16px;stroke:#666;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── Filter Bar ── */
#filterbar{display:flex;align-items:center;gap:6px;padding:8px 16px;border-bottom:1px solid #ebebeb;background:#fff;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#filterbar::-webkit-scrollbar{display:none}
.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:20px;border:1.5px solid #e0e0e0;font-size:12px;font-weight:500;background:#fff;color:#555;white-space:nowrap;transition:all .15s;user-select:none}
.chip:hover{border-color:#bbb;background:#fafafa}
.chip.on{background:#1D9E75;color:#fff;border-color:#1D9E75}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sort-sel{font-size:12px;padding:5px 10px;border-radius:8px;border:1.5px solid #e0e0e0;background:#f8f8f8;color:#666;margin-left:auto;flex-shrink:0;outline:none}

/* ── Map Area ── */
#map-wrap{flex:1;position:relative;overflow:hidden}
#gmap{width:100%;height:100%}

/* ── Map UI Overlays ── */
.map-ctrl{position:absolute;right:12px;top:12px;display:flex;flex-direction:column;gap:4px;z-index:10}
.mc-btn{width:34px;height:34px;background:#fff;border:1px solid #ddd;border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.1);font-size:16px}
.mc-btn svg{width:16px;height:16px;stroke:#555;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
#legend{position:absolute;left:12px;bottom:30px;background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:10px 14px;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.lg-row{display:flex;align-items:center;gap:7px;font-size:11px;color:#555;margin-bottom:5px}
.lg-row:last-child{margin:0}
.lg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#toast{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(30,30,30,.88);color:#fff;border-radius:20px;padding:7px 18px;font-size:12px;z-index:150;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1}

/* ── Sidebar (PC 기본형) ── */
#sidebar{width:320px;display:flex;flex-direction:column;border-left:1px solid #ebebeb;background:#fff;flex-shrink:0;overflow:hidden;z-index:90;transition:transform 0.3s cubic-bezier(0.1, 0.76, 0.55, 0.94), height 0.3s ease}
.sheet-handle{display:none;width:100%;padding:8px 0;cursor:pointer;background:#fff;align-items:center;justify-content:center;border-bottom:1px solid #f0f0f0}
.sheet-handle::before{content:'';width:36px;height:4px;background:#ddd;border-radius:2px}
.stabs{display:flex;border-bottom:1px solid #ebebeb;flex-shrink:0}
.stab{flex:1;padding:11px 6px;font-size:12px;font-weight:500;text-align:center;border:none;background:transparent;color:#999;border-bottom:2.5px solid transparent;transition:color .15s}
.stab.on{color:#1D9E75;border-bottom-color:#1D9E75}
.cat-bar{display:flex;gap:5px;padding:8px 12px;border-bottom:1px solid #ebebeb;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.cat-bar::-webkit-scrollbar{display:none}
.ctab{font-size:11px;padding:4px 11px;border-radius:12px;border:1.5px solid #e8e8e8;background:transparent;color:#888;font-weight:500;white-space:nowrap}
.ctab.on{background:#F1EFE8;color:#2C2C2A;border-color:#ccc}
.sb-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.sb-body::-webkit-scrollbar{width:4px}
.sb-body::-webkit-scrollbar-thumb{background:#e0e0e0;border-radius:2px}

/* ── Place Cards ── */
.pcard{padding:12px 16px;border-bottom:1px solid #f0f0f0;cursor:pointer;transition:background .1s}
.pcard:hover,.pcard.sel{background:#f7fbf9}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px}
.pc-name{font-size:13px;font-weight:600;color:#111}
.pc-dist{font-size:11px;color:#bbb}
.pc-area{font-size:11px;color:#999;margin-bottom:5px}
.pc-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px}
.pc-bottom{display:flex;align-items:center;gap:4px}
.pc-stars{font-size:11px;color:#E8A020}
.pc-count{font-size:11px;color:#bbb}
.pc-open{font-size:10px;color:#1D9E75;font-weight:600}
.pc-closed{font-size:10px;color:#E24B4A;font-weight:600}
.empty{padding:40px 16px;text-align:center;color:#bbb}
.empty svg{width:36px;height:36px;margin:0 auto 10px;stroke:#d0d0d0;fill:none;stroke-width:1.5;display:block;stroke-linecap:round;stroke-linejoin:round}
.empty p{font-size:13px}

/* ── Tags ── */
.tag{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.tag-h{background:#E1F5EE;color:#085041}
.tag-hf{background:#9FE1CB;color:#04342C}
.tag-p{background:#E6F1FB;color:#042C53}
.tag-v{background:#EAF3DE;color:#173404}

/* ── Detail Panel ── */
.dp{padding:16px}
.dp-hero{width:100%;height:110px;border-radius:10px;background:linear-gradient(135deg,#E1F5EE,#f0f9f4);display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.dp-hero svg{width:42px;height:42px;stroke:#5DCAA5;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.dp-name{font-size:16px;font-weight:700;margin-bottom:3px;color:#111}
.dp-addr{font-size:12px;color:#999;margin-bottom:8px}
.dp-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.dp-rating{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;margin-bottom:14px}
.dp-score{font-size:32px;font-weight:700;color:#111}
.dp-score-right .stars-lg{font-size:16px;color:#E8A020;margin-bottom:2px}
.dp-score-right .rev-cnt{font-size:11px;color:#bbb}
.dp-sec{margin-bottom:12px}
.dp-label{font-size:11px;color:#aaa;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.dp-label svg{width:13px;height:13px;stroke:#aaa;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.dp-val{font-size:13px;color:#333}
.dp-open-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;background:#E1F5EE;color:#1D9E75;margin-left:6px}
.dp-closed-badge{background:#FEF2F2;color:#E24B4A}
.cert-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:#E1F5EE;border-radius:7px;font-size:11px;font-weight:600;color:#085041}
.cert-badge svg{width:12px;height:12px;stroke:#1D9E75;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.dp-desc{font-size:12px;color:#777;line-height:1.7;margin-bottom:14px}
.dp-btns{display:flex;flex-direction:column;gap:7px}
.btn-primary{width:100%;padding:11px;background:#1D9E75;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-primary svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.btn-sec{width:100%;padding:10px;background:#fff;color:#1D9E75;border:1.5px solid #1D9E75;border-radius:10px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-sec svg{width:15px;height:15px;stroke:#1D9E75;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.btn-ghost{width:100%;padding:10px;background:#f8f8f8;color:#555;border:1.5px solid #e8e8e8;border-radius:10px;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-ghost svg{width:15px;height:15px;stroke:#999;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.btn-ghost.saved{color:#E24B4A;border-color:#fcc}
.btn-ghost.saved svg{stroke:#E24B4A}

/* ── Reviews Panel ── */
.rv-top{padding:14px 16px;border-bottom:1px solid #f0f0f0}
.rv-summary{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.rv-big{font-size:38px;font-weight:700;color:#111}
.rv-bars{flex:1}
.rv-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.rv-bar-n{font-size:10px;color:#bbb;width:8px}
.rv-track{flex:1;height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden}
.rv-fill{height:100%;background:#E8A020;border-radius:3px}
.rv-cnt{font-size:10px;color:#ccc;width:16px;text-align:right}
.rv-item{padding:12px 16px;border-bottom:1px solid #f5f5f5}
.rv-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.rv-user-row{display:flex;align-items:center;gap:8px}
.rv-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.rv-uname覆{font-size:12px;font-weight:600;color:#111}
.rv-uname{font-size:12px;font-weight:600;color:#111}
.rv-date{font-size:11px;color:#ccc}
.rv-stars{font-size:12px;color:#E8A020}
.rv-text{font-size:12px;color:#666;line-height:1.65}
.rv-write{padding:14px 16px}
.rv-write-title{font-size:12px;font-weight:600;color:#333;margin-bottom:8px}
.star-picker{display:flex;gap:5px;margin-bottom:8px}
.star-btn{font-size:22px;color:#e0e0e0;background:none;border:none;padding:0;transition:color .1s}
.star-btn.lit{color:#E8A020}
.rv-textarea{width:100%;height:70px;padding:9px 12px;border-radius:8px;border:1.5px solid #e8e8e8;font-size:12px;resize:none;background:#f9f9f9;font-family:inherit;outline:none;color:#333}
.rv-textarea:focus{border-color:#1D9E75;background:#fff}
.rv-submit{width:100%;margin-top:7px;padding:9px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600}

/* ── Route Panel ── */
.route-wrap{padding:16px}
.route-dest{font-size:13px;font-weight:600;margin-bottom:12px;color:#111;padding-bottom:10px;border-bottom:1px solid #f0f0f0}
.route-modes{display:flex;gap:5px;margin-bottom:12px}
.rmode-single{width:100%;padding:10px;border-radius:9px;font-size:12px;font-weight:600;border:none;background:#1D9E75;color:#fff;display:flex;align-items:center;justify-content:center;gap:6px}
.route-summary-box{background:#f7fbf9;border-radius:10px;padding:12px 16px;display:flex;gap:20px;margin-bottom:14px}
.rs-cell{text-align:center}
.rs-val{font-size:18px;font-weight:700;color:#1D9E75}
.rs-val span{font-size:12px;font-weight:500}
.rs-lab{font-size:10px;color:#aaa;margin-top:1px}
.step-row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #f5f5f5}
.step-row:last-child{border:none}
.step-icon{width:30px;height:30px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.step-icon svg{width:14px;height:14px;stroke:#085041;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.step-text{font-size:12px;color:#333;line-height:1.5}
.step-dist{font-size:11px;color:#bbb;margin-top:2px}
.gmaps-note{font-size:11px;color:#bbb;margin-top:12px;text-align:center}

/* ── Saved ── */
.saved-list{padding:14px 16px}
.saved-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5;cursor:pointer}
.saved-item:last-child{border:none}
.saved-ico{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.saved-ico svg{width:18px;height:18px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.saved-info{flex:1}
.saved-name{font-size:13px;font-weight:600;color:#111}
.saved-sub覆{font-size:11px;color:#bbb;margin-top:1px}
.saved-sub{font-size:11px;color:#bbb;margin-top:1px}
.saved-del{background:none;border:none;color:#ddd;font-size:18px;padding:4px}

/* ── Profile ── */
.profile-wrap{padding:20px 16px}
.profile-avatar{width:60px;height:60px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.profile-avatar svg{width:28px;height:28px;stroke:#1D9E75;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.profile-name{text-align:center;font-size:15px;font-weight:700;margin-bottom:4px}
.profile-sub{text-align:center;font-size:12px;color:#bbb;margin-bottom:18px}
.pref-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #f5f5f5}
.pref-left{display:flex;align-items:center;gap:9px;font-size:13px;color:#333}
.pref-left svg{width:16px;height:16px;stroke:#aaa;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.pref-right{font-size:12px;color:#bbb}

/* ── Bottom Nav ── */
.bottom-nav{display:flex;border-top:1px solid #ebebeb;flex-shrink:0;background:#fff}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border:none;background:transparent;color:#bbb;font-size:10px;font-weight:500}
.nav-item svg{width:22px;height:22px;stroke:#bbb;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-item.on{color:#1D9E75}
.nav-item.on svg{stroke:#1D9E75}

/* ══════════════════════════════════════════════
   📱 MOBILE RESPONSIVE OPTIMIZATION (Bottom Sheet)
══════════════════════════════════════════════ */
@media (max-width: 768px) {
  #body { flex-direction: column; }
  
  /* 사이드바를 하단 고정 시트 구조로 전환 */
  #sidebar {
    width: 100%;
    height: 180px; /* 기본 접힌 상태 높이 */
    position: absolute;
    bottom: 0;
    left: 0;
    border-left: none;
    border-top: 1px solid #e0e0e0;
    border-top-left-radius: 16px;
    border-top-right-radius: 16px;
    box-shadow: 0 -3px 12px rgba(0,0,0,0.12);
    transform: translateY(0);
  }
  
  /* 드래그 및 열기용 상단 핸들 노출 */
  .sheet-handle { display: flex; }
  
  /* 지도가 하단 시트에 가려지지 않도록 패딩 보정 */
  #map-wrap { margin-bottom: 50px; }
  .map-ctrl { top: inherit; bottom: 150px; right: 12px; }
  #legend { bottom: 150px; left: 12px; padding: 6px 10px; font-size: 10px; }
  
  /* 시트 상태 세팅별 스타일 */
  #sidebar.sheet-collapsed { height: 60px; }
  #sidebar.sheet-half { height: 45vh; }
  #sidebar.sheet-full { height: 82vh; }
}
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <a class="logo" onclick="resetApp()">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
      </div>
      <span class="logo-text">K-Map</span>
    </a>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search halal, pork-free, vegetarian places...">
    </div>
    <div class="topbar-actions">
      <button class="lang-btn">EN</button>
      <button class="user-btn" onclick="navClick('profile')">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
    </div>
  </div>

  <div id="filterbar">
    <div class="chip on" data-f="all">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
      All
    </div>
    <div class="chip" data-f="halal"><span class="chip-dot" style="background:#1D9E75"></span>Halal Certified</div>
    <div class="chip" data-f="halal-f"><span class="chip-dot" style="background:#5DCAA5"></span>Halal Friendly</div>
    <div class="chip" data-f="pork"><span class="chip-dot" style="background:#378ADD"></span>Pork-Free</div>
    <div class="chip" data-f="veg"><span class="chip-dot" style="background:#639922"></span>Vegetarian</div>
    <div class="filter-divider"></div>
    <div class="chip" data-f="hotel"><span class="chip-dot" style="background:#BA7517"></span>Hotels</div>
    <div class="chip" data-f="attraction"><span class="chip-dot" style="background:#7F77DD"></span>Attractions</div>
    <select class="sort-sel" id="sortSel">
      <option value="dist">Nearest first</option>
      <option value="rating">Top rated</option>
      <option value="reviews">Most reviewed</option>
    </select>
  </div>

  <div id="body">

    <div id="map-wrap">
      <div id="gmap"></div>

      <div class="map-ctrl" id="mapCtrl">
        <button class="mc-btn" title="My Location" onclick="goMyLocation()">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
        </button>
        <button class="mc-btn" title="Satellite" onclick="toggleMapType()">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>
        </button>
      </div>

      <div id="legend" id="mapLegend">
        <div class="lg-row"><div class="lg-dot" style="background:#1D9E75"></div>Halal Certified</div>
        <div class="lg-row"><div class="lg-dot" style="background:#5DCAA5"></div>Halal Friendly</div>
        <div class="lg-row"><div class="lg-dot" style="background:#378ADD"></div>Pork-Free</div>
        <div class="lg-row"><div class="lg-dot" style="background:#639922"></div>Vegetarian</div>
      </div>

      <div id="toast"></div>
    </div>

    <div id="sidebar" class="sheet-half">
      <div class="sheet-handle" onclick="toggleMobileSheet()"></div>
      
      <div class="stabs" id="stabs">
        <button class="stab on" data-tab="list">Places</button>
        <button class="stab" data-tab="detail">Detail</button>
        <button class="stab" data-tab="reviews">Reviews</button>
        <button class="stab" data-tab="route">Route</button>
      </div>
      <div class="cat-bar" id="catBar">
        <button class="ctab on" data-cat="all">All</button>
        <button class="ctab" data-cat="restaurant">Restaurants</button>
        <button class="ctab" data-cat="hotel">Hotels</button>
        <button class="ctab" data-cat="attraction">Attractions</button>
      </div>
      <div class="sb-body" id="sbBody"></div>
      
      <div class="bottom-nav">
        <button class="nav-item on" data-nav="map" onclick="navClick('map')">
          <svg viewBox="0 0 24 24"><path d="M3 6l6-3 6 3 6-3v15l-6 3-6-3-6 3z"/><path d="M9 3v15M15 6v15"/></svg>Map
        </button>
        <button class="nav-item" data-nav="route" onclick="navClick('route')">
          <svg viewBox="0 0 24 24"><circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/></svg>Route
        </button>
        <button class="nav-item" data-nav="saved" onclick="navClick('saved')">
          <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Saved
        </button>
        <button class="nav-item" data-nav="profile" onclick="navClick('profile')">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Me
        </button>
      </div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════
   DATA
══════════════════════════════════════════════ */
const PLACES = [
  {id:1,name:"Madinah Kitchen",area:"이태원",addr:"Itaewon-ro 244, Yongsan-gu",cat:"restaurant",tags:["halal","pork"],lat:37.5344,lng:126.9938,rating:4.8,reviews:127,open:true,hours:"11:00–22:00",cert:"KMF-2024-0182",phone:"+82-2-790-1234",desc:"Authentic Middle Eastern cuisine with full KMF halal certification. Famous for lamb kebabs, hummus, and fresh pita bread."},
  {id:2,name:"Istanbul Kebab House",area:"이태원",addr:"Noksapyeong-daero 40, Yongsan-gu",cat:"restaurant",tags:["halal"],lat:37.5335,lng:126.9925,rating:4.7,reviews:156,open:false,hours:"12:00–22:00",cert:"KMF-2024-0091",phone:"+82-2-792-5566",desc:"Family-run Turkish restaurant. Doner kebab, pide bread, baklava. Fully halal certified since 2019."},
  {id:3,name:"The Dubai Shawarma",area:"이태원",addr:"Usadan-ro 17, Yongsan-gu",cat:"restaurant",tags:["halal","pork"],lat:37.5352,lng:126.9948,rating:4.5,reviews:89,open:true,hours:"10:00–23:00",cert:"KMF-2024-0207",phone:"+82-10-1234-5678",desc:"Fast-casual shawarma with certified halal chicken and beef. Perfect for a quick halal meal in Itaewon."},
  {id:4,name:"Joo Sarang Korean BBQ",area:"이태원",addr:"Itaewon-ro 55, Yongsan-gu",cat:"restaurant",tags:["pork"],lat:37.5340,lng:126.9945,rating:4.2,reviews:63,open:true,hours:"17:00–00:00",cert:"",phone:"+82-2-793-4321",desc:"Korean BBQ specializing in beef and chicken only. No pork products. Muslim-friendly service staff available."},
  {id:5,name:"Green Bowl Hongdae",area:"홍대",addr:"Eoulmadang-ro 130, Mapo-gu",cat:"restaurant",tags:["veg","pork"],lat:37.5553,lng:126.9228,rating:4.3,reviews:76,open:true,hours:"11:30–21:00",cert:"",phone:"+82-2-324-9988",desc:"100% plant-based Korean fusion. No meat, no fish, no animal products. Certified by Korean Vegan Society."},
  {id:6,name:"The Vegan Table",area:"홍대",addr:"Hongik-ro 20, Mapo-gu",cat:"restaurant",tags:["veg"],lat:37.5565,lng:126.9215,rating:4.6,reviews:94,open:true,hours:"11:00–21:30",cert:"",phone:"+82-2-322-7788",desc:"Seoul's most celebrated vegan restaurant. Organic, locally sourced, 100% plant-based menu."},
  {id:7,name:"Seoul Garden Hotel",area:"이태원",addr:"Bogwang-ro 55, Yongsan-gu",cat:"hotel",tags:["halal-f","pork"],lat:37.5370,lng:126.9980,rating:4.6,reviews:214,open:true,hours:"24h check-in",cert:"",phone:"+82-2-797-1000",desc:"Muslim-friendly hotel. Qibla direction marked in rooms, prayer mats provided, halal breakfast on request. Prayer room on 2F."},
  {id:8,name:"Myeongdong Sky Hostel",area:"명동",addr:"Myeongdong-gil 30, Jung-gu",cat:"hotel",tags:["halal-f"],lat:37.5635,lng:126.9840,rating:4.4,reviews:301,open:true,hours:"24h check-in",cert:"",phone:"+82-2-318-1234",desc:"Budget-friendly hostel in Myeongdong. Halal-friendly breakfast, prayer room on 3F, multilingual staff."},
  {id:9,name:"N Seoul Tower",area:"남산",addr:"Namsangongwon-gil 105, Yongsan-gu",cat:"attraction",tags:[],lat:37.5512,lng:126.9882,rating:4.9,reviews:2841,open:true,hours:"10:00–23:00",cert:"",phone:"+82-2-3455-9277",desc:"Seoul's iconic landmark on Namsan. Halal-certified café on 2F, prayer room in basement. Breathtaking city views."},
  {id:10,name:"Gyeongbokgung Palace",area:"경복궁",addr:"Sajik-ro 161, Jongno-gu",cat:"attraction",tags:[],lat:37.5796,lng:126.9770,rating:4.8,reviews:3201,open:true,hours:"09:00–18:00",cert:"",phone:"+82-2-3700-3900",desc:"Korea's largest Joseon-dynasty palace. Halal food vendors near the main gate. UNESCO cultural heritage site."},
];

const REVIEWS = {
  1:[{user:"Ahmed K.",flag:"🇸🇦",av:"AK",bg:"#E1F5EE",tc:"#085041",stars:5,text:"Best halal food in Seoul! The lamb is incredibly tender. Staff spoke English well.",date:"2 days ago"},
     {user:"Fatima L.",flag:"🇲🇾",av:"FL",bg:"#9FE1CB",tc:"#04342C",stars:5,text:"Found this on K-Map and it was a lifesaver. Proper halal cert displayed at entrance!",date:"5 days ago"}],
  9:[{user:"Sarah M.",flag:"🇬🇧",av:"SM",bg:"#EEEDFE",tc:"#26215C",stars:5,text:"Amazing views of Seoul! The halal café on 2F was a pleasant surprise.",date:"3 days ago"}]
};

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let map = null, markers = {}, infoWindow = null, mapType = 'roadmap';
let activeFilter='all', activeCat='all', activeTab='list', selectedId=null, savedIds=new Set(), searchQ='', sortMode='dist', reviewStars=5;

/* ══════════════════════════════════════════════
   MOBILE BOTTOM SHEET TOGGLE
══════════════════════════════════════════════ */
function toggleMobileSheet() {
  const sheet = document.getElementById('sidebar');
  if (sheet.classList.contains('sheet-collapsed')) {
    sheet.classList.remove('sheet-collapsed');
    sheet.classList.add('sheet-half');
  } else if (sheet.classList.contains('sheet-half')) {
    sheet.classList.remove('sheet-half');
    sheet.classList.add('sheet-full');
  } else {
    sheet.classList.remove('sheet-full');
    sheet.classList.add('sheet-collapsed');
  }
}

function setSheetState(state) {
  if (window.innerWidth > 768) return; // 모바일 스크린에서만 작동
  const sheet = document.getElementById('sidebar');
  sheet.classList.remove('sheet-collapsed', 'sheet-half', 'sheet-full');
  sheet.classList.add('sheet-' + state);
}

/* ══════════════════════════════════════════════
   GOOGLE MAPS INIT (Fixed to English)
══════════════════════════════════════════════ */
function initMap() {
  map = new google.maps.Map(document.getElementById('gmap'), {
    center: { lat: 37.5490, lng: 126.9910 },
    zoom: 14,
    mapTypeId: 'roadmap',
    mapTypeControl: false,
    fullscreenControl: false,
    streetViewControl: false,
    zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_TOP },
    styles: [
      { featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}] },
      { featureType:'transit',elementType:'labels.icon',stylers:[{visibility:'off'}] }
    ]
  });

  infoWindow = new google.maps.InfoWindow({ maxWidth: 240 });
  map.addListener('click', () => infoWindow.close());
  renderMarkers();
}

function markerColor(p) {
  if (p.cat==='hotel') return '#BA7517';
  if (p.cat==='attraction') return '#7F77DD';
  if (p.tags.includes('halal')) return '#1D9E75';
  if (p.tags.includes('halal-f')) return '#5DCAA5';
  if (p.tags.includes('veg')) return '#639922';
  return '#378ADD';
}

function makePinSvg(color, selected=false) {
  const r = selected ? 16 : 13;
  const sw = selected ? 3 : 2;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${r*2+sw*2}" height="${r*2+sw*2+10}" viewBox="0 0 ${r*2+sw*2} ${r*2+sw*2+10}">
    <circle cx="${r+sw}" cy="${r+sw}" r="${r}" fill="${color}" stroke="white" stroke-width="${sw}"/>
    <polygon points="${r+sw-5},${r*2+sw} ${r+sw+5},${r*2+sw} ${r+sw},${r*2+sw+10}" fill="${color}"/>
    <circle cx="${r+sw}" cy="${r+sw}" r="${Math.round(r*0.38)}" fill="white" opacity="0.45"/>
  </svg>`;
  return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
}

function renderMarkers() {
  if (!map) return;
  const vis = visiblePlaces();
  const visIds = new Set(vis.map(p=>p.id));

  Object.keys(markers).forEach(id => {
    if (!visIds.has(+id)) { markers[id].setMap(null); delete markers[id]; }
  });

  vis.forEach(p => {
    const color = markerColor(p);
    const isSel = p.id === selectedId;
    const icon = { url: makePinSvg(color, isSel), anchor: new google.maps.Point(isSel?19:16, isSel?42:36) };

    if (markers[p.id]) {
      markers[p.id].setIcon(icon);
      markers[p.id].setZIndex(isSel ? 100 : 1);
      return;
    }

    const m = new google.maps.Marker({
      position: { lat: p.lat, lng: p.lng },
      map,
      icon,
      title: p.name,
      zIndex: isSel ? 100 : 1,
    });

    m.addListener('click', () => openInfoWindow(p, m));
    markers[p.id] = m;
  });
}

function openInfoWindow(p, marker) {
  selectedId = p.id;
  const tagHtml = buildTags(p.tags);
  const starsStr = '★'.repeat(Math.round(p.rating)) + '☆'.repeat(5-Math.round(p.rating));
  const color = markerColor(p);

  infoWindow.setContent(`
    <div style="padding:4px 2px;min-width:200px;font-family:'Noto Sans KR','Segoe UI',system-ui,sans-serif">
      <div style="font-size:14px;font-weight:700;margin-bottom:2px;color:#111">${p.name}</div>
      <div style="font-size:11px;color:#aaa;margin-bottom:7px">${p.addr}</div>
      <div style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px">${tagHtml}</div>
      <div style="font-size:12px;color:#E8A020;margin-bottom:10px">${starsStr} <span style="color:#bbb">${p.rating} (${p.reviews})</span></div>
      <button onclick="window.__kmapSelect(${p.id})" style="width:100%;padding:8px;background:${color};color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">View Details →</button>
    </div>
  `);
  infoWindow.open(map, marker);

  renderMarkers();
  if (activeTab === 'list') renderList();
  setSheetState('half'); // 마커 클릭 시 정보 식별이 쉽도록 중간 높이로 자동 변경
}

function loadGoogleMapsWithKey(key) {
  const s = document.createElement('script');
  s.src = `https://maps.googleapis.com/maps/api/js?key=${key}&callback=initMap&language=en&region=KR&libraries=places&hl=en`;
  s.async = true;
  document.head.appendChild(s);
}

/* ── Helpers & Rendering ── */
const TAG_MAP = { halal:['Halal Certified','tag-h'], 'halal-f':['Halal Friendly','tag-hf'], pork:['Pork-Free','tag-p'], veg:['Vegetarian','tag-v'] };
function buildTags(tags) { return tags.filter(t=>TAG_MAP[t]).map(t=>`<span class="tag ${TAG_MAP[t][1]}">${TAG_MAP[t][0]}</span>`).join(''); }
function starsStr(n, size=11) { return `<span style="color:#E8A020;font-size:${size}px">${'★'.repeat(Math.round(n))}${'☆'.repeat(5-Math.round(n))}</span>`; }
function dist(id) { return ((id*0.37+0.3)%2.1+0.1).toFixed(1); }
function matchF(p) { if (activeFilter==='all') return true; if (activeFilter==='hotel') return p.cat==='hotel'; if (activeFilter==='attraction') return p.cat==='attraction'; return p.tags.includes(activeFilter); }
function matchC(p) { return activeCat==='all' || p.cat===activeCat; }
function matchS(p) { if (!searchQ) return true; return p.name.toLowerCase().includes(searchQ) || p.addr.toLowerCase().includes(searchQ) || p.area.toLowerCase().includes(searchQ); }
function visiblePlaces() { let list = PLACES.filter(p=>matchF(p)&&matchC(p)&&matchS(p)); if (sortMode==='rating') list.sort((a,b)=>b.rating-a.rating); else if (sortMode==='reviews') list.sort((a,b)=>b.reviews-a.reviews); else list.sort((a,b)=>parseFloat(dist(a.id))-parseFloat(dist(b.id))); return list; }

let toastT = null;
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(()=>t.classList.remove('show'), 2600);
}

function renderList() {
  const body = document.getElementById('sbBody');
  document.getElementById('catBar').style.display = 'flex';
  const vis = visiblePlaces();
  if (!vis.length) {
    body.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><line x1="4" y1="4" x2="20" y2="20"/></svg><p>No places match filters.</p></div>`;
    return;
  }
  body.innerHTML = vis.map(p => `
    <div class="pcard ${selectedId===p.id?'sel':''}" data-id="${p.id}">
      <div class="pc-top"><div class="pc-name">${p.name}</div><div class="pc-dist">${dist(p.id)} km</div></div>
      <div class="pc-area">${p.area} · ${p.cat}</div>
      <div class="pc-tags">${buildTags(p.tags)}</div>
      <div class="pc-bottom">${starsStr(p.rating)} <span class="pc-count">(${p.reviews})</span><span class="${p.open?'pc-open':'pc-closed'}">${p.open?'· Open':'· Closed'}</span></div>
    </div>
  `).join('');
  body.querySelectorAll('.pcard').forEach(c => c.addEventListener('click', ()=>selectPlace(+c.dataset.id)));
}

function renderDetail(id) {
  const p = PLACES.find(x=>x.id===id);
  document.getElementById('catBar').style.display = 'none';
  const body = document.getElementById('sbBody');
  if (!p) { body.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24"><path d="M15 15l6 6M9.5 4a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11z"/></svg><p>Select a place on the map.</p></div>`; return; }
  const saved = savedIds.has(id);
  const color = markerColor(p);
  body.innerHTML = `
    <div class="dp">
      <div class="dp-name">${p.name}</div>
      <div class="dp-addr">${p.addr}</div>
      <div class="dp-tags">${buildTags(p.tags)}</div>
      <div class="dp-rating"><div class="dp-score">${p.rating}</div><div><div>${'★'.repeat(Math.round(p.rating))}</div><div class="rev-cnt">${p.reviews} reviews</div></div></div>
      <div class="dp-sec"><div class="dp-label">Hours</div><div class="dp-val">${p.hours}</div></div>
      <p class="dp-desc">${p.desc}</p>
      <div class="dp-btns">
        <button class="btn-primary" onclick="goDirections(${id})">Get Directions (Google Maps)</button>
        <button class="btn-sec" onclick="switchTab('reviews')">Read Reviews</button>
        <button class="btn-ghost ${saved?'saved':''}" onclick="toggleSave(${id})">${saved?'Saved ♥':'Save Place'}</button>
      </div>
    </div>
  `;
}

function renderReviews(id) {
  const p = PLACES.find(x=>x.id===id);
  document.getElementById('catBar').style.display = 'none';
  const body = document.getElementById('sbBody');
  if (!p) { body.innerHTML=`<div class="empty"><p>Select a place first.</p></div>`; return; }
  const rvs = REVIEWS[id]||[];
  body.innerHTML = `
    <div class="rv-top"><div style="font-weight:700">${p.name}</div></div>
    ${rvs.map(rv=>`<div class="rv-item"><div class="rv-head"><div class="rv-uname">${rv.flag} ${rv.user}</div><div>${'★'.repeat(rv.stars)}</div></div><div class="rv-text">${rv.text}</div></div>`).join('')}
  `;
}

function renderRoute(id) {
  const p = PLACES.find(x=>x.id===id);
  document.getElementById('catBar').style.display = 'none';
  const body = document.getElementById('sbBody');
  if (!p) { body.innerHTML=`<div class="empty"><p>Select a destination first.</p></div>`; return; }
  body.innerHTML = `
    <div class="route-wrap">
      <div class="route-dest">To: ${p.name}</div>
      <div class="route-modes"><button class="rmode-single" onclick="openGoogleMapsRoute(${id})">Route (Google Maps)</button></div>
      <div class="route-summary-box">
        <div class="rs-cell"><div class="rs-val">260<span>m</span></div><div class="rs-lab">Distance</div></div>
        <div class="rs-cell"><div class="rs-val">4<span>min</span></div><div class="rs-lab">Walk</div></div>
      </div>
      <button class="btn-primary" onclick="openGoogleMapsRoute(${id})">Open in Google Maps</button>
    </div>
  `;
}

function renderSaved() {
  document.getElementById('catBar').style.display = 'none';
  document.getElementById('stabs').style.display = 'none';
  const body = document.getElementById('sbBody');
  const list = PLACES.filter(p=>savedIds.has(p.id));
  if (!list.length) { body.innerHTML=`<div class="empty"><p>No saved places yet.</p></div>`; return; }
  body.innerHTML = `<div class="saved-list">`+list.map(p=>`<div class="saved-item" onclick="selectPlace(${p.id})"><div class="saved-name">${p.name}</div></div>`).join('')+`</div>`;
}

function renderProfile() {
  document.getElementById('catBar').style.display = 'none';
  document.getElementById('stabs').style.display = 'none';
  const body = document.getElementById('sbBody');
  body.innerHTML = `<div class="profile-wrap"><div class="profile-name">Guest User</div><button class="btn-primary" onclick="showToast('OAuth Implementation')">Continue with Google</button></div>`;
}

/* ── Actions ── */
window.__kmapSelect = id => selectPlace(id);

function selectPlace(id) {
  selectedId = id;
  document.getElementById('stabs').style.display = 'flex';
  switchTab('detail');
  renderMarkers();
  if (map) {
    const p = PLACES.find(x=>x.id===id);
    if (p) {
      map.panTo({lat:p.lat,lng:p.lng});
      if (markers[id] && infoWindow) openInfoWindow(p, markers[id]);
    }
  }
  updateNav('map');
  setSheetState('half'); // 모바일에서 선택 후 내용을 파악하기 쉽게 창 높이 최적화
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.stab').forEach(t=>t.classList.toggle('on',t.dataset.tab===tab));
  if (tab==='list') renderList();
  else if (tab==='detail') renderDetail(selectedId);
  else if (tab==='reviews') renderReviews(selectedId);
  else if (tab==='route') renderRoute(selectedId);
}

function navClick(nav) {
  updateNav(nav);
  document.getElementById('stabs').style.display = nav==='map' ? 'flex' : 'none';
  if (nav==='map') { resetApp(); setSheetState('half'); }
  else if (nav==='route') { activeTab='route'; renderRoute(selectedId); setSheetState('full'); }
  else if (nav==='saved') { renderSaved(); setSheetState('full'); }
  else if (nav==='profile') { renderProfile(); setSheetState('full'); }
}

function updateNav(nav) { document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('on',n.dataset.nav===nav)); }
function toggleSave(id) { savedIds.has(id) ? savedIds.delete(id) : savedIds.add(id); if (activeTab==='detail') renderDetail(id); showToast(savedIds.has(id) ? '💚 Saved!' : 'Removed'); }
function goDirections(id) { openGoogleMapsRoute(id); }
function openGoogleMapsRoute(id) { const p = PLACES.find(x=>x.id===id); if (!p) return; window.open(`https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}&hl=en`, '_blank'); }

function goMyLocation() {
  if (!navigator.geolocation) { showToast('Not supported'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    if (map) map.panTo({lat:pos.coords.latitude,lng:pos.coords.longitude});
  }, () => showToast('Permission denied'));
}

function toggleMapType() {
  if (!map) return;
  mapType = mapType==='roadmap' ? 'satellite' : 'roadmap';
  map.setMapTypeId(mapType);
}

function resetApp() { updateNav('map'); document.getElementById('stabs').style.display = 'flex'; document.getElementById('catBar').style.display = 'flex'; switchTab('list'); }

/* ── Event Listeners ── */
document.getElementById('filterbar').addEventListener('click', e=>{
  const chip = e.target.closest('.chip'); if (!chip || !chip.dataset.f) return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  chip.classList.add('on'); activeFilter = chip.dataset.f; selectedId = null;
  if (infoWindow) infoWindow.close(); renderMarkers(); if (activeTab==='list') renderList();
});

document.getElementById('catBar').addEventListener('click', e=>{
  const btn = e.target.closest('.ctab'); if (!btn) return;
  document.querySelectorAll('.ctab').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on'); activeCat = btn.dataset.cat; renderMarkers(); renderList();
});

document.getElementById('stabs').addEventListener('click', e=>{
  const t = e.target.closest('.stab'); if (!t) return;
  switchTab(t.dataset.tab);
});

document.getElementById('searchInput').addEventListener('input', e=>{
  searchQ = e.target.value.toLowerCase(); renderMarkers(); if (activeTab==='list') renderList();
});

document.getElementById('sortSel').addEventListener('change', e=>{ sortMode = e.target.value; if (activeTab==='list') renderList(); });

window.addEventListener('load', ()=>{
  const fixedKey = "AIzaSyDvlGDS0KnLyUpPVT9J40Nz7x0wJqNmCaU";
  loadGoogleMapsWithKey(fixedKey);
  renderList();
  setSheetState('half');
});
</script>
</body>
